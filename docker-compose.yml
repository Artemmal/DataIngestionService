services:
  api:
    build:
      context: .
      dockerfile: src/DataIngestionService.Api/Dockerfile
    container_name: data-ingestion-api
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=data_ingestion;Username=postgres;Password=postgres
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    container_name: data-ingestion-postgres
    environment:
      POSTGRES_DB: data_ingestion
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: